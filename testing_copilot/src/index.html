<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Sales Copilot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;
  --surface:#16213e;
  --surface2:#0f3460;
  --border:#2a2a4a;
  --text:#e8e8f0;
  --dim:#6b6b8a;
  --accent:#7c6af7;
  --accent-soft:rgba(124,106,247,.12);
  --user-bg:#2d2b55;
  --ai-bg:#1e1e35;
  --green:#4ade80;
  --red:#f87171;
  --yellow:#fbbf24;
}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:13.5px;color:var(--text)}

#app{width:100%;height:100%;display:flex;flex-direction:column}

/* ── HEADER ── */
#header{display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);
  -webkit-app-region:drag;flex-shrink:0}
#logo{width:28px;height:28px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;box-shadow:0 0 12px rgba(124,106,247,.4)}
#header-text{flex:1;min-width:0}
#header-title{font-size:12px;font-weight:700;letter-spacing:.05em}
#header-sub{font-size:10px;color:var(--dim);margin-top:1px}
#header-right{display:flex;align-items:center;gap:8px;-webkit-app-region:no-drag;flex-shrink:0}

/* client selector */
#client-wrap{display:flex;align-items:center;gap:6px;background:var(--accent-soft);
  border:1px solid rgba(124,106,247,.25);border-radius:8px;padding:4px 10px;cursor:pointer}
#client-icon{font-size:12px}
#client-select{background:transparent;border:none;color:var(--text);
  font-size:11px;font-weight:600;outline:none;cursor:pointer;
  max-width:120px;-webkit-app-region:no-drag}
#client-select option{background:#1a1a2e;color:var(--text)}

#status-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;
  transition:background .3s,box-shadow .3s}
#status-dot.ready{background:var(--green);box-shadow:0 0 6px var(--green)}
#status-dot.thinking{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse .8s infinite}
#status-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.wbtn{background:none;border:none;cursor:pointer;font-size:13px;padding:3px 6px;
  border-radius:5px;color:var(--dim);transition:all .15s;-webkit-app-region:no-drag;z-index:10}
.wbtn:hover{background:var(--border);color:var(--text)}
#close-btn:hover{background:rgba(248,113,113,.2);color:var(--red)}

/* ── KEYWORD CHIPS ── */
#chips-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;border-bottom:1px solid var(--border)}
#chips-bar::-webkit-scrollbar{display:none}
.chip{background:var(--surface);border:1px solid var(--border);color:var(--dim);
  border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.chip:active{transform:scale(.97)}

/* ── CHAT ── */
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:16px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;min-height:0}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:10px;max-width:100%;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* AI message */
.msg.ai{align-self:flex-start;align-items:flex-start;max-width:92%}
.msg.ai .avatar{width:28px;height:28px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  flex-shrink:0;margin-top:2px}
.msg.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);
  border-radius:4px 14px 14px 14px;padding:12px 14px;line-height:1.65;
  font-size:13px;color:var(--text);white-space:pre-wrap;word-break:break-word}
.msg.ai .source{font-size:9.5px;color:var(--dim);margin-top:5px;letter-spacing:.05em}

/* User message */
.msg.user{align-self:flex-end;flex-direction:row-reverse;max-width:85%}
.msg.user .bubble{background:var(--user-bg);border:1px solid rgba(124,106,247,.3);
  border-radius:14px 4px 14px 14px;padding:10px 14px;
  font-size:13px;color:var(--text);word-break:break-word}

/* Typing indicator */
#typing{display:none;align-self:flex-start;align-items:center;gap:10px}
#typing .avatar{width:28px;height:28px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
#typing .dots{display:flex;gap:5px;padding:12px 16px;background:var(--ai-bg);
  border:1px solid var(--border);border-radius:4px 14px 14px 14px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dim);
  animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT ── */
#input-area{padding:12px 14px;border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0}
#input-row{display:flex;gap:8px;align-items:flex-end}
#input{flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;
  font-family:inherit;resize:none;outline:none;max-height:120px;line-height:1.5;
  transition:border-color .2s;min-height:42px}
#input::placeholder{color:var(--dim)}
#input:focus{border-color:var(--accent)}
#mic-btn{width:42px;height:42px;border-radius:12px;background:var(--surface2);
  border:1px solid var(--border);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#mic-btn:hover{border-color:var(--accent)}
#mic-btn.recording{border-color:var(--red);background:rgba(248,113,113,.15);animation:mic-pulse 1.2s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 5px rgba(248,113,113,.2)}}
#send-btn{width:42px;height:42px;border-radius:12px;background:var(--accent);
  border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;
  justify-content:center;transition:opacity .15s;flex-shrink:0}
#send-btn:hover:not(:disabled){opacity:.85}
#send-btn:disabled{opacity:.3;cursor:not-allowed}

#welcome{text-align:center;color:var(--dim);font-size:12px;padding:30px 20px;line-height:2}
#welcome strong{color:var(--accent);display:block;font-size:16px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="logo">🏦</div>
    <div id="header-text">
      <div id="header-title">Sales Copilot</div>
      <div id="header-sub">BNP Paribas · AI Assistant</div>
    </div>
    <div id="header-right">
      <div id="client-wrap">
        <span id="client-icon">👤</span>
        <select id="client-select"><option value="">Select client</option></select>
      </div>
      <div id="status-dot"></div>
      <button class="wbtn" id="min-btn">—</button>
      <button class="wbtn" id="close-btn">✕</button>
    </div>
  </div>

  <!-- KEYWORD CHIPS -->
  <div id="chips-bar"><!-- filled by JS --></div>

  <!-- CHAT -->
  <div id="chat">
    <div id="welcome">
      <strong>👋 Bonjour</strong>
      Select a client above, then pick a keyword or ask a question below.
    </div>
    <div id="typing" class="msg ai" style="display:none">
      <div class="avatar">🤖</div>
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <div id="input-row">
      <textarea id="input" placeholder="Ask anything about a client…" rows="1" disabled></textarea>
      <button id="mic-btn" title="Voice">🎙</button>
      <button id="send-btn" disabled title="Send">↑</button>
    </div>
  </div>

</div>
<script src="renderer.js"></script>
</body>
</html>
