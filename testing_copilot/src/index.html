<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Sales Copilot — Meeting Monitor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d0d14;overflow:hidden;
  font-family:'Cascadia Code','Consolas','Courier New',monospace;font-size:13px;color:#e8e8f0}
#app{width:100%;height:100%;display:flex;flex-direction:column}

#titlebar{display:flex;align-items:center;gap:8px;padding:9px 13px;
  background:#11111c;border-bottom:1px solid #1e1e32;
  -webkit-app-region:drag;flex-shrink:0}
#dot{width:7px;height:7px;border-radius:50%;background:#7c6af7;
  box-shadow:0 0 8px #7c6af7;flex-shrink:0}
#title{font-size:11px;font-weight:700;letter-spacing:.1em;opacity:.55}
#titlebar-right{margin-left:auto;display:flex;gap:4px;-webkit-app-region:no-drag}
.wbtn{background:none;border:none;cursor:pointer;font-size:13px;
  padding:2px 7px;border-radius:4px;color:#44445a;transition:all .15s;z-index:10}
.wbtn:hover{background:#1e1e32;color:#e8e8f0}
#close-btn:hover{background:rgba(248,113,113,.2);color:#f87171}

#output{flex:1;overflow-y:auto;padding:10px 14px 4px;
  scrollbar-width:thin;scrollbar-color:#1e1e32 transparent;
  white-space:pre-wrap;word-break:break-word;line-height:1.65;font-size:13px}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-thumb{background:#1e1e32;border-radius:2px}
.out{color:#b0b0cc}
.err{color:#f87171;opacity:.75}
.in{color:#7c6af7;font-weight:600}

#input-row{display:flex;align-items:center;
  border-top:1px solid #1e1e32;background:#11111c;flex-shrink:0}
#caret{color:#7c6af7;font-size:14px;padding:10px 6px 10px 14px;flex-shrink:0;user-select:none}
#input{flex:1;background:transparent;border:none;outline:none;
  color:#e8e8f0;font-size:13px;font-family:inherit;padding:10px 0;caret-color:#7c6af7}
#input::placeholder{color:#2a2a44}
#send-btn{background:#7c6af7;border:none;color:#fff;font-size:12px;font-weight:700;
  padding:10px 18px;cursor:pointer;transition:opacity .15s;flex-shrink:0}
#send-btn:hover{opacity:.85}
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <div id="dot"></div>
    <span id="title">MEETING MONITOR</span>
    <div id="titlebar-right">
      <button class="wbtn" id="min-btn">—</button>
      <button class="wbtn" id="close-btn">✕</button>
    </div>
  </div>
  <div id="output"></div>
  <div id="input-row">
    <span id="caret">›</span>
    <input id="input" placeholder="type here if prompted…" autocomplete="off" spellcheck="false"/>
    <button id="send-btn">Send</button>
  </div>
</div>
<script src="renderer.js"></script>
</body>
</html>
